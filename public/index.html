<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>StreamHub BD</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23667eea'/><stop offset='100%25' stop-color='%23764ba2'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='url(%23g)'/><path d='M30 25h40a5 5 0 015 5v40a5 5 0 01-5 5H30a5 5 0 01-5-5V30a5 5 0 015-5zm5 10v30l20-15z' fill='white'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cloudflare-dns.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <h1>StreamHub BD</h1>
    <p class="subtitle">Live Streaming Channels</p>
  </header>

  <main>
    <section id="loading-area" class="loading-area hidden" aria-live="polite" aria-label="Loading status">
      <div class="spinner" role="status" aria-label="Loading"></div>
      <p class="loading-text">Loading playlist…</p>
    </section>

    <section id="progress-area" class="progress-area hidden" aria-live="polite" aria-label="Validation progress">
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
      </div>
      <p class="progress-text" id="progress-text">0 of 0 channels validated</p>
    </section>

    <section id="status-area" class="status-area hidden" aria-live="polite" aria-label="Channel status summary">
      <p class="status-text" id="status-text"></p>
    </section>

    <section id="error-area" class="error-area hidden" aria-live="assertive" aria-label="Error messages">
      <p class="error-message" id="error-message"></p>
      <button class="retry-button" id="retry-button" type="button">Retry</button>
    </section>

    <section id="search-area" class="search-area hidden" aria-label="Channel search">
      <div class="search-container">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search-input" class="search-input" placeholder="Search channels..." autocomplete="off" aria-label="Search channels">
        <span id="channel-count" class="channel-count"></span>
      </div>
      <div id="category-filter" class="category-filter" role="tablist" aria-label="Channel categories">
      </div>
    </section>

    <section id="channel-grid" class="channel-grid" aria-label="TV Channels">
    </section>

    <section id="player-overlay" class="player-overlay hidden">
      <div class="player-container">
        <div class="player-header">
          <span id="player-channel-name" class="player-channel-name"></span>
          <button id="player-close" class="player-close" type="button" aria-label="Close player">&times;</button>
        </div>
        <video id="video-player" controls autoplay></video>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script type="module" src="dnsResolver.js"></script>
  <script type="module" src="channelDisplay.js"></script>
  <script type="module" src="controller.js"></script>
</body>
</html>
